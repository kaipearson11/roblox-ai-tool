<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GameDev AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- OPEN SIDEBAR BUTTON -->
  <button id="openSidebar" class="open-sidebar hidden">☰</button>

  <!-- SIDEBAR -->
  <div id="sidebar" class="sidebar">

    <div class="sidebar-top">
      <div class="logo">G</div>

      <div class="title-group">
        <h1>GameDev AI</h1>
        <p>Build games faster</p>
      </div>

      <button id="closeSidebar" class="close-btn">☰</button>
    </div>

    <button id="newProject" class="new-project">+ New Project</button>

    <div class="projects">
      <h3>Projects</h3>
      <div id="projectList"></div>
    </div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <span class="live">● Live Workspace</span>

      <div>
        <button id="renameBtn">Rename</button>
        <button id="deleteBtn">Delete</button>
      </div>
    </div>

    <!-- SMALL HEADER -->
    <div class="header">
      <h2 id="projectTitle">New Project</h2>
      <p id="projectSubtitle">Start chatting to build your game.</p>
    </div>

    <!-- CHAT -->
    <div id="chat" class="chat"></div>

    <!-- TYPING -->
    <div id="typing" class="typing hidden">AI is typing...</div>

    <!-- INPUT -->
    <form id="form" class="input">
      <textarea id="input" placeholder="Ask anything..."></textarea>
      <button type="submit">Send</button>
    </form>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
