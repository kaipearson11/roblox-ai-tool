<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GameDev AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <div id="sidebar" class="sidebar">

    <div class="top">
      <div class="logo">G</div>

      <!-- THIS BUTTON STAYS VISIBLE EVEN WHEN COLLAPSED -->
      <button id="toggleSidebar" class="toggle">☰</button>
    </div>

    <div class="sidebar-content">
      <h2>GameDev AI</h2>
      <p>Scripts, ideas, systems</p>

      <button id="newProject">+ New Project</button>

      <div class="projects">
        <h4>Projects</h4>
        <div id="projectList"></div>
      </div>
    </div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      <div>● Live Workspace</div>

      <div class="actions">
        <button id="renameBtn">Rename</button>
        <button id="deleteBtn">Delete</button>
      </div>
    </div>

    <div class="title">
      <h1 id="projectTitle">New Project</h1>
      <p>Start chatting to build your next Roblox idea.</p>
    </div>

    <div id="chat" class="chat"></div>

    <div id="typing" class="typing hidden">AI is typing...</div>

    <form id="form" class="input-area">
      <textarea id="input" placeholder="Ask anything..."></textarea>
      <button type="submit">Send</button>
    </form>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
