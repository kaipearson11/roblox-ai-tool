<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameDev AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #050816;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .sidebar {
      width: 290px;
      background: #07103a;
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      transition: width 0.25s ease;
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: 86px;
    }

    .sidebar-top {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px 12px;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 28px;
      cursor: pointer;
      transition: 0.2s;
    }

    .icon-btn:hover {
      background: rgba(255,255,255,0.14);
    }

    .sidebar-title {
      padding: 0 16px 12px 16px;
    }

    .sidebar.collapsed .sidebar-title,
    .sidebar.collapsed .project-name-text,
    .sidebar.collapsed .sidebar-footer-text {
      display: none;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtext {
      color: #aeb8d6;
      font-size: 14px;
      line-height: 1.4;
    }

    .projects {
      flex: 1;
      padding: 0 10px 10px 10px;
      overflow-y: auto;
    }

    .project-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 12px;
      border-radius: 14px;
      cursor: pointer;
      color: white;
      margin-bottom: 8px;
      transition: 0.2s;
      background: transparent;
      border: 1px solid transparent;
    }

    .project-item:hover {
      background: rgba(255,255,255,0.06);
    }

    .project-item.active {
      background: rgba(85, 125, 255, 0.22);
      border-color: rgba(110, 145, 255, 0.3);
    }

    .project-icon {
      font-size: 20px;
      min-width: 24px;
      text-align: center;
    }

    .sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: #9aa8d4;
      font-size: 12px;
      line-height: 1.5;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #04114c 0%, #02081d 100%);
    }

    .topbar {
      padding: 18px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .project-title {
      font-size: 34px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-actions {
      display: flex;
      gap: 12px;
    }

    .action-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .rename-btn {
      background: #3f76ff;
    }

    .rename-btn:hover {
      background: #5a89ff;
    }

    .delete-btn {
      background: #ff4b5c;
    }

    .delete-btn:hover {
      background: #ff6272;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .message-row {
      display: flex;
      width: 100%;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.ai {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 720px;
      padding: 18px 22px;
      border-radius: 22px;
      line-height: 1.55;
      font-size: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .bubble.user {
      background: #3f76ff;
      color: white;
      border-bottom-right-radius: 8px;
    }

    .bubble.ai {
      background: rgba(255,255,255,0.10);
      color: white;
      border-bottom-left-radius: 8px;
    }

    .typing {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      height: 16px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cfd8ff;
      animation: bounce 1.1s infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    .input-wrap {
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.12);
    }

    .input-bar {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }

    textarea {
      flex: 1;
      min-height: 64px;
      max-height: 180px;
      resize: vertical;
      border: none;
      outline: none;
      border-radius: 18px;
      padding: 18px;
      font-size: 18px;
      background: rgba(255,255,255,0.06);
      color: white;
    }

    textarea::placeholder {
      color: #8f98b8;
    }

    .send-btn {
      border: none;
      border-radius: 18px;
      padding: 0 24px;
      font-size: 20px;
      font-weight: 700;
      background: #3f76ff;
      color: white;
      cursor: pointer;
      min-width: 110px;
    }

    .send-btn:hover {
      background: #5a89ff;
    }

    @media (max-width: 800px) {
      .sidebar {
        width: 86px;
      }

      .sidebar-title,
      .project-name-text,
      .sidebar-footer-text {
        display: none;
      }

      .project-title {
        font-size: 24px;
      }

      .topbar {
        padding: 14px;
      }

      .chat {
        padding: 14px;
      }

      .bubble {
        max-width: 92%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button class="icon-btn" id="toggleSidebar">☰</button>
        <button class="icon-btn" id="newProjectBtn">＋</button>
      </div>

      <div class="sidebar-title">
        <div class="brand">GameDev AI</div>
        <div class="subtext">Ideas, scripts, and help for game development.</div>
      </div>

      <div class="projects" id="projectsList"></div>

      <div class="sidebar-footer">
        <div class="sidebar-footer-text">
          GameDev AI is an independent tool and is not affiliated with any game platform.
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="project-title" id="projectTitle">New Project</div>
        <div class="topbar-actions">
          <button class="action-btn rename-btn" id="renameBtn">Rename</button>
          <button class="action-btn delete-btn" id="deleteBtn">Delete</button>
        </div>
      </div>

      <div class="chat" id="chat"></div>

      <div class="input-wrap">
        <div class="input-bar">
          <textarea id="messageInput" placeholder="Ask about scripts, ideas, mechanics, systems, balancing, UI, and more..."></textarea>
          <button class="send-btn" id="sendBtn">Send</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const projectsList = document.getElementById("projectsList");
    const projectTitle = document.getElementById("projectTitle");
    const renameBtn = document.getElementById("renameBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const newProjectBtn = document.getElementById("newProjectBtn");
    const toggleSidebar = document.getElementById("toggleSidebar");
    const sidebar = document.getElementById("sidebar");

    let projects = [];
    let currentProjectId = null;

    function saveProjects() {
      localStorage.setItem("gamedev_ai_projects", JSON.stringify(projects));
      localStorage.setItem("gamedev_ai_current_project", currentProjectId || "");
    }

    function loadProjects() {
      const savedProjects = localStorage.getItem("gamedev_ai_projects");
      const savedCurrent = localStorage.getItem("gamedev_ai_current_project");

      if (savedProjects) {
        projects = JSON.parse(savedProjects);
      }

      if (projects.length === 0) {
        createProject();
        return;
      }

      currentProjectId = savedCurrent || projects[0].id;
      if (!projects.find(p => p.id === currentProjectId)) {
        currentProjectId = projects[0].id;
      }

      renderProjects();
      renderCurrentProject();
    }

    function createProject(name = "New Project") {
      const id = Date.now().toString();
      const project = {
        id,
        name,
        messages: [
          {
            role: "ai",
            content: "Hello! How can I assist you today with game development, Lua scripts, ideas, mechanics, UI, or systems?"
          }
        ]
      };

      projects.unshift(project);
      currentProjectId = id;
      saveProjects();
      renderProjects();
      renderCurrentProject();
    }

    function getCurrentProject() {
      return projects.find(p => p.id === currentProjectId);
    }

    function renderProjects() {
      projectsList.innerHTML = "";

      projects.forEach(project => {
        const item = document.createElement("div");
        item.className = "project-item" + (project.id === currentProjectId ? " active" : "");
        item.innerHTML = `
          <div class="project-icon">📁</div>
          <div class="project-name-text">${escapeHtml(project.name)}</div>
        `;
        item.onclick = () => {
          currentProjectId = project.id;
          saveProjects();
          renderProjects();
          renderCurrentProject();
        };
        projectsList.appendChild(item);
      });
    }

    function renderCurrentProject() {
      const project = getCurrentProject();
      if (!project) return;

      projectTitle.textContent = project.name;
      chat.innerHTML = "";

      project.messages.forEach(msg => {
        addMessageToChat(msg.role, msg.content, false);
      });

      chat.scrollTop = chat.scrollHeight;
    }

    function addMessageToChat(role, content, shouldScroll = true, isTyping = false) {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble ${role}`;

      if (isTyping) {
        bubble.innerHTML = `
          <div class="typing">
            <span></span><span></span><span></span>
          </div>
        `;
      } else {
        bubble.textContent = content;
      }

      row.appendChild(bubble);
      chat.appendChild(row);

      if (shouldScroll) {
        chat.scrollTop = chat.scrollHeight;
      }

      return row;
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      const project = getCurrentProject();
      if (!project) return;

      project.messages.push({ role: "user", content: text });
      saveProjects();
      addMessageToChat("user", text);
      messageInput.value = "";

      const typingEl = addMessageToChat("ai", "", true, true);

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: text,
            history: project.messages
          })
        });

        const data = await response.json();

        typingEl.remove();

        const aiText = data.reply || "Something went wrong.";
        project.messages.push({ role: "ai", content: aiText });
        saveProjects();
        addMessageToChat("ai", aiText);
      } catch (error) {
        typingEl.remove();
        const errorText = "Error: could not reach the server.";
        project.messages.push({ role: "ai", content: errorText });
        saveProjects();
        addMessageToChat("ai", errorText);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    sendBtn.addEventListener("click", sendMessage);

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    newProjectBtn.addEventListener("click", () => {
      createProject();
    });

    renameBtn.addEventListener("click", () => {
      const project = getCurrentProject();
      if (!project) return;

      const newName = prompt("Rename project:", project.name);
      if (!newName || !newName.trim()) return;

      project.name = newName.trim();
      saveProjects();
      renderProjects();
      renderCurrentProject();
    });

    deleteBtn.addEventListener("click", () => {
      const project = getCurrentProject();
      if (!project) return;

      const ok = confirm(`Delete "${project.name}"?`);
      if (!ok) return;

      projects = projects.filter(p => p.id !== project.id);

      if (projects.length === 0) {
        createProject();
        return;
      }

      currentProjectId = projects[0].id;
      saveProjects();
      renderProjects();
      renderCurrentProject();
    });

    toggleSidebar.addEventListener("click", () => {
      sidebar.classList.toggle("collapsed");
    });

    loadProjects();
  </script>
</body>
</html>
